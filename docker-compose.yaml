services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE=http://localhost:3001
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - WATCHPACK_POLLING=true
